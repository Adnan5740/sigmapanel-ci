services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "2775:2775"
    environment:
      - DATABASE_URL=data/sigmapanel.db
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --save 60 1 --loglevel warning
